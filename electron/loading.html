<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Wardyn — Loading</title>
  <style>
    :root { color-scheme: dark; }
    html, body { height: 100%; margin: 0; }
    body {
      
      min-height: fit-content;
      font-family: system-ui, sans-serif;
      background: #111827;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-drag: none;
    }
    img {
      max-width: 560px;
      width: 70%;
      -webkit-user-drag: none;
      border-radius: 10px;
    }
    .status {
      margin-top: 22px;
      margin-bottom: 22px;
      font-size: 13px;
      color: #aaa;
      letter-spacing: 0.3px;
    }
    .spinner {
      margin-top: 16px;
      width: 28px;
      height: 28px;
      border: 3px solid #333;
      border-top-color: #4a8;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <img src="assets/logo-full.png" alt="Wardyn" />
  <div class="spinner"></div>
  <div class="status">Starting Wardyn…</div>
</body>
</html>
