<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Bastion — Canvas</title>
<link rel="stylesheet" href="/ui/styles.css" />
<style>
  /* Page-specific: canvas */
  .canvas-toolbar {
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 16px;
    align-items: center;
    background: var(--surface);
  }
  .canvas-toolbar .muted { color: var(--text-muted); }
  .canvas-toolbar select,
  .canvas-toolbar input,
  .canvas-toolbar button {
    background: var(--input-bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    font: inherit;
    width: auto;
    margin: 0;
  }
  .canvas-toolbar button { cursor: pointer; }
  .canvas-toolbar button:hover { border-color: var(--accent); }

  main { display: flex; flex-direction: column; gap: 16px; }

  .item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .item header { padding: 10px 14px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; position: static; background: transparent; height: auto; z-index: auto; }
  .item .title { font-weight: 600; }
  .item .ts { color: var(--text-muted); font-size: 12px; }
  .item .kind { display: inline-block; background: rgba(15,98,254,0.12); color: var(--accent); padding: 2px 8px; border-radius: 4px; font-size: 11px; text-transform: uppercase; margin-right: 6px; }
  .body { padding: 14px; }

  /* Canvas tables */
  .body table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .body th, .body td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
  .body th { background: var(--input-bg); color: var(--text-muted); font-weight: 600; }

  /* Markdown rendering */
  .md h1, .md h2, .md h3 { margin: .4em 0; }
  .md p { margin: .4em 0; }
  .md code { background: var(--input-bg); padding: 1px 4px; border-radius: 3px; font: 12px var(--mono); }
  .md pre code { background: transparent; padding: 0; }

  .chart svg { width: 100%; height: 280px; }
  .empty { color: var(--text-muted); text-align: center; padding: 40px 0; }
</style>
</head>
<body>
<nav class="navbar">
  <a class="navbar-brand" href="/ui/hub.html">
    <span class="brand-prefix">&gt;</span>bastion
  </a>
  <div class="nav-links">
    <a class="nav-link" href="/ui/hub.html">Hub</a>
    <a class="nav-link" href="/chat">Chat</a>
    <a class="nav-link" href="/ui/skills.html">Skills</a>
    <a class="nav-link active" href="/ui/canvas.html">Canvas</a>
    <a class="nav-link" href="/ui/heartbeat.html">Heartbeat</a>
    <a class="nav-link" href="/ui/approvals.html">Approvals</a>
    <a class="nav-link" href="/ui/security.html">Security</a>
    <a class="nav-link" href="/ui/setup.html">Setup</a>
  </div>
</nav>
<div class="canvas-toolbar">
  <span class="muted">agent output surface</span>
  <span style="flex:1"></span>
  <label class="muted">session&nbsp;<input id="session" placeholder="(all)" style="width:200px" /></label>
  <label class="muted">auto&nbsp;<input id="auto" type="checkbox" checked style="width:auto" /></label>
  <button id="refresh">refresh</button>
  <button id="clear">clear</button>
</div>
<main id="list" class="container"><div class="empty">loading...</div></main>
<script>
  const apiToken = localStorage.getItem("apiToken") || "";
  const getCsrf = () => { const m = document.cookie.match(/(?:^|;\s*)bastion_csrf=([^;]+)/); return m ? m[1] : ''; };
  const H = () => {
    const h = {};
    if (apiToken) h["x-api-token"] = apiToken;
    const csrf = getCsrf();
    if (csrf) h["x-csrf-token"] = csrf;
    return h;
  };
  const qs = new URLSearchParams(location.search);
  const sessionInput = document.getElementById("session");
  sessionInput.value = qs.get("session") || "";
  const fmtTs = t => new Date(t).toLocaleString();
  const esc = s => String(s ?? "").replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));

  // Minimal markdown: headings, bold/italic, code, links, lists.
  function mdToHtml(md) {
    md = esc(md);
    md = md.replace(/```([\s\S]*?)```/g, (_,c) => `<pre><code>${c}</code></pre>`);
    md = md.replace(/`([^`]+)`/g, (_,c) => `<code>${c}</code>`);
    md = md.replace(/^###### (.*)$/gm,"<h6>$1</h6>").replace(/^##### (.*)$/gm,"<h5>$1</h5>")
           .replace(/^#### (.*)$/gm,"<h4>$1</h4>").replace(/^### (.*)$/gm,"<h3>$1</h3>")
           .replace(/^## (.*)$/gm,"<h2>$1</h2>").replace(/^# (.*)$/gm,"<h1>$1</h1>");
    md = md.replace(/\*\*([^*]+)\*\*/g,"<b>$1</b>").replace(/\*([^*]+)\*/g,"<i>$1</i>");
    md = md.replace(/^(?:- |\* )(.*)$/gm,"<li>$1</li>");
    md = md.replace(/(<li>[\s\S]*?<\/li>\n?)+/g, m => `<ul>${m}</ul>`);
    md = md.replace(/\n\n+/g,"</p><p>");
    return `<div class="md"><p>${md}</p></div>`;
  }

  function renderTable(d) {
    const cols = d.columns || [];
    const rows = d.rows || [];
    let h = "<table><thead><tr>";
    for (const c of cols) h += `<th>${esc(c)}</th>`;
    h += "</tr></thead><tbody>";
    for (const r of rows) { h += "<tr>"; for (const cell of r) h += `<td>${esc(cell)}</td>`; h += "</tr>"; }
    h += "</tbody></table>";
    return h;
  }

  function renderChart(d) {
    const type = d.type === "line" ? "line" : "bar";
    const labels = d.labels || [];
    const series = (d.series || []).slice(0, 6);
    const W = 900, H = 280, padL = 40, padB = 30, padT = 10, padR = 10;
    const innerW = W - padL - padR, innerH = H - padT - padB;
    const all = series.flatMap(s => s.values || []);
    const max = Math.max(1, ...all);
    const min = Math.min(0, ...all);
    const span = max - min || 1;
    const colors = ["#6ea8fe","#7ee787","#f2c35c","#ff7b72","#d2a8ff","#79c0ff"];
    const xStep = innerW / Math.max(1, labels.length);
    let svg = `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">`;
    // axes
    svg += `<line x1="${padL}" y1="${H-padB}" x2="${W-padR}" y2="${H-padB}" stroke="#2a313a"/>`;
    svg += `<line x1="${padL}" y1="${padT}" x2="${padL}" y2="${H-padB}" stroke="#2a313a"/>`;
    for (let i=0;i<labels.length;i++){
      const x = padL + xStep*(i+.5);
      svg += `<text x="${x}" y="${H-padB+14}" fill="#7d8696" font-size="10" text-anchor="middle">${esc(labels[i])}</text>`;
    }
    series.forEach((s, si) => {
      const col = colors[si % colors.length];
      const vals = s.values || [];
      if (type === "bar") {
        const bw = Math.max(2, (xStep / series.length) - 4);
        vals.forEach((v,i) => {
          const x = padL + xStep*i + (xStep/series.length)*si + 2;
          const h = innerH * ((v - min) / span);
          svg += `<rect x="${x}" y="${H-padB-h}" width="${bw}" height="${h}" fill="${col}"/>`;
        });
      } else {
        let path = "";
        vals.forEach((v,i) => {
          const x = padL + xStep*(i+.5);
          const y = H-padB - innerH * ((v - min) / span);
          path += (i === 0 ? "M" : "L") + x + "," + y + " ";
        });
        svg += `<path d="${path}" fill="none" stroke="${col}" stroke-width="2"/>`;
      }
      svg += `<text x="${W-padR}" y="${padT+14+si*14}" fill="${col}" font-size="11" text-anchor="end">${esc(s.name||"")}</text>`;
    });
    svg += "</svg>";
    return `<div class="chart">${svg}</div>`;
  }

  // Very conservative HTML sanitizer — strips script/style/event handlers.
  function sanitizeHtml(html) {
    html = String(html);
    html = html.replace(/<\/?(?:script|style|iframe|object|embed|link|meta)\b[^>]*>/gi, "");
    html = html.replace(/\son\w+\s*=\s*(['"]).*?\1/gi, "");
    html = html.replace(/\son\w+\s*=\s*[^\s>]+/gi, "");
    html = html.replace(/javascript:/gi, "");
    return html;
  }

  function renderItem(it) {
    let body = "";
    try {
      if (it.kind === "markdown") body = mdToHtml(it.data);
      else if (it.kind === "table") body = renderTable(it.data);
      else if (it.kind === "chart") body = renderChart(it.data);
      else if (it.kind === "html") body = sanitizeHtml(it.data);
      else if (it.kind === "code") body = `<pre><code>${esc((it.data && it.data.source) || "")}</code></pre>`;
      else if (it.kind === "json") body = `<pre><code>${esc(JSON.stringify(it.data, null, 2))}</code></pre>`;
    } catch (e) { body = `<pre>render error: ${esc(e.message)}</pre>`; }
    return `<article class="item">
      <header>
        <div><span class="kind">${it.kind}</span><span class="title">${esc(it.title || "(untitled)")}</span></div>
        <div class="ts">${esc(it.sessionId)} · ${fmtTs(it.createdAt)}</div>
      </header>
      <div class="body">${body}</div>
    </article>`;
  }

  async function load() {
    const s = sessionInput.value.trim();
    const url = s ? `/api/canvas?session=${encodeURIComponent(s)}` : "/api/canvas";
    try {
      const r = await fetch(url, { headers: H() });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const j = await r.json();
      const list = document.getElementById("list");
      const items = j.items || [];
      if (items.length === 0) { list.innerHTML = `<div class="empty">no canvas items${s?` for session "${esc(s)}"`:""}.</div>`; return; }
      list.innerHTML = items.slice().reverse().map(renderItem).join("");
    } catch (e) {
      document.getElementById("list").innerHTML = `<div class="empty">error: ${esc(e.message)}</div>`;
    }
  }

  document.getElementById("refresh").onclick = load;
  sessionInput.addEventListener("change", load);
  document.getElementById("clear").onclick = async () => {
    const s = sessionInput.value.trim();
    if (!confirm(s ? `clear canvas for session "${s}"?` : "clear entire canvas?")) return;
    const body = s ? { session: s } : { all: true };
    await fetch("/api/canvas/clear", {
      method: "POST",
      headers: { "content-type": "application/json", ...H() },
      body: JSON.stringify(body),
    });
    load();
  };
  setInterval(() => { if (document.getElementById("auto").checked) load(); }, 3000);
  load();
</script>
</body>
</html>
