<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Secure-Claw Skill Approvals</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0c162f; color: #e2e8f0; min-height: 100vh; }

    .header { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: #141d35; border-bottom: 1px solid #1e2d4a; flex-wrap: wrap; }
    .header h1 { font-size: 16px; font-weight: 600; color: #94a3b8; }
    .nav-links { display: flex; gap: 8px; margin-left: auto; }
    .nav-link { padding: 6px 12px; border: 1px solid #1e2d4a; border-radius: 6px; background: #1e293b; color: #94a3b8; font-size: 12px; text-decoration: none; }
    .nav-link:hover { background: #2d3a52; color: #e2e8f0; }
    .nav-link.active { background: #0f62fe; color: #fff; border-color: #0f62fe; }

    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

    .status-bar { display: flex; gap: 12px; margin-bottom: 16px; align-items: center; }
    .status-pill { padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid #1e2d4a; background: #141d35; color: #94a3b8; }
    .status-pill.active { background: #0f62fe; color: #fff; border-color: #0f62fe; }
    .status-pill .count { background: rgba(255,255,255,0.15); padding: 1px 6px; border-radius: 10px; margin-left: 4px; font-size: 11px; }

    .approval-mode { margin-left: auto; font-size: 12px; color: #64748b; }
    .approval-mode .mode-badge { display: inline-block; padding: 3px 8px; border-radius: 4px; font-weight: 600; }
    .approval-mode .mode-badge.on { background: #14532d; color: #4ade80; border: 1px solid #22c55e; }
    .approval-mode .mode-badge.off { background: #422006; color: #facc15; border: 1px solid #eab308; }

    .empty-state { text-align: center; padding: 60px 20px; color: #475569; }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    .approval-card { background: #141d35; border: 1px solid #1e2d4a; border-radius: 10px; padding: 20px; margin-bottom: 12px; }
    .approval-card.has-blockers { border-color: #ef4444; }
    .approval-card .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .card-header .skill-name { font-size: 16px; font-weight: 600; color: #e2e8f0; }
    .card-header .badge { padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
    .badge.build { background: #1e3a5f; color: #60a5fa; }
    .badge.import { background: #3b1f4e; color: #c084fc; }

    .card-meta { display: flex; gap: 16px; margin-bottom: 12px; font-size: 12px; color: #64748b; }

    .ast-warnings { margin-bottom: 12px; }
    .ast-warnings h4 { font-size: 12px; color: #94a3b8; margin-bottom: 6px; text-transform: uppercase; }
    .warning-item { display: flex; align-items: center; gap: 8px; padding: 4px 8px; margin-bottom: 2px; border-radius: 4px; font-size: 12px; font-family: monospace; }
    .warning-item.block { background: #450a0a; color: #fca5a5; }
    .warning-item.warn { background: #422006; color: #fde68a; }
    .warning-item.info { background: #1e293b; color: #94a3b8; }
    .warning-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .warning-item.block .warning-dot { background: #ef4444; }
    .warning-item.warn .warning-dot { background: #eab308; }
    .warning-item.info .warning-dot { background: #64748b; }

    .code-preview { background: #0c162f; border: 1px solid #1e2d4a; border-radius: 6px; padding: 12px; margin-bottom: 12px; max-height: 200px; overflow-y: auto; font-family: monospace; font-size: 12px; white-space: pre-wrap; color: #94a3b8; display: none; }
    .code-preview.show { display: block; }

    .card-actions { display: flex; gap: 8px; align-items: center; }
    .btn { padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 600; border: none; cursor: pointer; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-approve { background: #16a34a; color: #fff; }
    .btn-approve:hover:not(:disabled) { background: #15803d; }
    .btn-reject { background: #dc2626; color: #fff; }
    .btn-reject:hover:not(:disabled) { background: #b91c1c; }
    .btn-secondary { background: #1e293b; color: #94a3b8; border: 1px solid #1e2d4a; }
    .btn-secondary:hover { background: #2d3a52; color: #e2e8f0; }

    .resolved-status { font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 12px; }
    .resolved-status.approved { background: #14532d; color: #4ade80; }
    .resolved-status.rejected { background: #450a0a; color: #f87171; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Skill Approvals</h1>
    <div class="nav-links">
      <a class="nav-link" href="/ui/chat.html">Chat</a>
      <a class="nav-link" href="/ui/skills.html">Skills</a>
      <a class="nav-link" href="/ui/hub.html">Hub</a>
      <a class="nav-link active" href="/ui/approvals.html">Approvals</a>
      <a class="nav-link" href="/ui/heartbeat.html">Heartbeat</a>
      <a class="nav-link" href="/ui/security.html">Security</a>
      <a class="nav-link" href="/ui/setup.html">Setup</a>
    </div>
  </div>

  <div class="container">
    <div class="status-bar">
      <div class="status-pill active" data-filter="pending" onclick="setFilter('pending')">Pending <span class="count" id="count-pending">0</span></div>
      <div class="status-pill" data-filter="approved" onclick="setFilter('approved')">Approved <span class="count" id="count-approved">0</span></div>
      <div class="status-pill" data-filter="rejected" onclick="setFilter('rejected')">Rejected <span class="count" id="count-rejected">0</span></div>
      <div class="status-pill" data-filter="all" onclick="setFilter('all')">All</div>
      <div class="approval-mode">
        Approval Queue: <span class="mode-badge" id="mode-badge">...</span>
      </div>
    </div>

    <div id="approvals-list"></div>
  </div>

  <script>
    let currentFilter = 'pending';
    let allApprovals = [];

    async function loadApprovals() {
      try {
        const res = await fetch('/api/approvals');
        const data = await res.json();
        allApprovals = data.approvals || [];

        // Update counts
        document.getElementById('count-pending').textContent = allApprovals.filter(a => a.status === 'pending').length;
        document.getElementById('count-approved').textContent = allApprovals.filter(a => a.status === 'approved').length;
        document.getElementById('count-rejected').textContent = allApprovals.filter(a => a.status === 'rejected').length;

        renderApprovals();
      } catch (err) {
        document.getElementById('approvals-list').innerHTML = '<div class="empty-state"><p>Failed to load approvals</p></div>';
      }
    }

    async function loadConfig() {
      try {
        const res = await fetch('/api/approvals/config/status');
        const data = await res.json();
        const badge = document.getElementById('mode-badge');
        if (data.approvalRequired) {
          badge.textContent = 'ENABLED';
          badge.className = 'mode-badge on';
        } else {
          badge.textContent = 'DISABLED';
          badge.className = 'mode-badge off';
        }
      } catch {}
    }

    function setFilter(f) {
      currentFilter = f;
      document.querySelectorAll('.status-pill').forEach(p => p.classList.toggle('active', p.dataset.filter === f));
      renderApprovals();
    }

    function renderApprovals() {
      const filtered = currentFilter === 'all' ? allApprovals : allApprovals.filter(a => a.status === currentFilter);
      const container = document.getElementById('approvals-list');

      if (filtered.length === 0) {
        container.innerHTML = `<div class="empty-state">
          <div class="icon">${currentFilter === 'pending' ? '\u2705' : '\ud83d\udce6'}</div>
          <p>${currentFilter === 'pending' ? 'No skills awaiting approval' : 'No ' + currentFilter + ' skills'}</p>
        </div>`;
        return;
      }

      container.innerHTML = filtered.map(a => renderCard(a)).join('');
    }

    function renderCard(approval) {
      const blockers = (approval.astWarnings || []).filter(w => w.severity === 'block');
      const warnings = (approval.astWarnings || []).filter(w => w.severity === 'warn');
      const hasBlockers = blockers.length > 0;
      const date = new Date(approval.requestedAt).toLocaleString();

      let warningsHtml = '';
      if (approval.astWarnings && approval.astWarnings.length > 0) {
        warningsHtml = `<div class="ast-warnings">
          <h4>AST Analysis (${blockers.length} blocked, ${warnings.length} warnings)</h4>
          ${approval.astWarnings.map(w => `
            <div class="warning-item ${w.severity}">
              <span class="warning-dot"></span>
              <span>${w.location ? w.location + ': ' : ''}${escapeHtml(w.description)}</span>
            </div>
          `).join('')}
        </div>`;
      }

      let actionsHtml = '';
      if (approval.status === 'pending') {
        actionsHtml = `<div class="card-actions">
          <button class="btn btn-approve" onclick="approveSkill('${approval.id}')">Approve & Activate</button>
          <button class="btn btn-reject" onclick="rejectSkillPrompt('${approval.id}')">Reject</button>
          <button class="btn btn-secondary" onclick="toggleCode('${approval.id}')">View Code</button>
        </div>`;
      } else {
        const statusClass = approval.status;
        const statusText = approval.status === 'approved' ? 'Approved' : 'Rejected';
        const reviewDate = approval.reviewedAt ? ' on ' + new Date(approval.reviewedAt).toLocaleString() : '';
        const reason = approval.rejectReason ? ` — ${escapeHtml(approval.rejectReason)}` : '';
        actionsHtml = `<div class="card-actions">
          <span class="resolved-status ${statusClass}">${statusText}${reviewDate}${reason}</span>
          <button class="btn btn-secondary" onclick="toggleCode('${approval.id}')" style="margin-left:auto">View Code</button>
        </div>`;
      }

      return `<div class="approval-card ${hasBlockers ? 'has-blockers' : ''}" id="card-${approval.id}">
        <div class="card-header">
          <span class="skill-name">${escapeHtml(approval.skillName)}</span>
          <span class="badge ${approval.type}">${approval.type}</span>
        </div>
        <div class="card-meta">
          <span>${approval.language}</span>
          <span>${date}</span>
          ${approval.author ? '<span>by ' + escapeHtml(approval.author) + '</span>' : ''}
          <span>${escapeHtml(approval.description)}</span>
        </div>
        ${warningsHtml}
        <div class="code-preview" id="code-${approval.id}">${escapeHtml(approval.code)}</div>
        ${actionsHtml}
      </div>`;
    }

    function toggleCode(id) {
      document.getElementById('code-' + id).classList.toggle('show');
    }

    async function approveSkill(id) {
      if (!confirm('Approve and activate this skill?')) return;
      try {
        const res = await fetch(`/api/approvals/${id}/approve`, { method: 'POST' });
        const data = await res.json();
        if (data.ok) {
          loadApprovals();
        } else {
          alert('Approval failed: ' + (data.error || 'unknown'));
        }
      } catch (err) {
        alert('Error: ' + err.message);
      }
    }

    async function rejectSkillPrompt(id) {
      const reason = prompt('Rejection reason (optional):');
      if (reason === null) return; // cancelled
      try {
        const res = await fetch(`/api/approvals/${id}/reject`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ reason: reason || undefined }),
        });
        const data = await res.json();
        if (data.ok) {
          loadApprovals();
        } else {
          alert('Rejection failed: ' + (data.error || 'unknown'));
        }
      } catch (err) {
        alert('Error: ' + err.message);
      }
    }

    function escapeHtml(s) {
      if (!s) return '';
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    loadApprovals();
    loadConfig();
    setInterval(loadApprovals, 15000);
  </script>
</body>
</html>
