<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Secure-Claw Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0c162f; color: #e2e8f0; height: 100vh; display: flex; flex-direction: column; }

    /* Header */
    .header { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: #141d35; border-bottom: 1px solid #1e2d4a; flex-shrink: 0; flex-wrap: wrap; }
    .header h1 { font-size: 16px; font-weight: 600; color: #94a3b8; }
    .toggle-group { display: flex; background: #1e2d4a; border-radius: 6px; overflow: hidden; }
    .toggle-btn { padding: 6px 14px; border: none; background: none; color: #64748b; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
    .toggle-btn.active { background: #0f62fe; color: #fff; }
    .new-session-btn, .setup-link { padding: 6px 12px; border: 1px solid #1e2d4a; border-radius: 6px; background: #1e293b; color: #94a3b8; font-size: 12px; cursor: pointer; text-decoration: none; }
    .new-session-btn:hover, .setup-link:hover { background: #2d3a52; color: #e2e8f0; }
    .header-right { display: flex; align-items: center; gap: 8px; margin-left: auto; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #475569; flex-shrink: 0; }
    .status-dot.connected { background: #22c55e; }
    .status-dot.error { background: #ef4444; }
    .status-text { font-size: 12px; color: #64748b; }
    .session-id { font-size: 11px; color: #475569; font-family: monospace; }
    .provider-tag { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px; background: #1e3a5f; color: #60a5fa; }
    .provider-tag.ollama { background: #1a3320; color: #4ade80; }
    .provider-tag.anthropic { background: #2d1f3d; color: #c084fc; }

    /* Config bar */
    .config-bar { display: flex; gap: 8px; padding: 8px 16px; background: #111827; border-bottom: 1px solid #1e2d4a; flex-shrink: 0; }
    .config-bar input { flex: 1; padding: 6px 10px; border-radius: 4px; border: 1px solid #1e2d4a; background: #1e293b; color: #e2e8f0; font-size: 13px; }
    .config-bar input::placeholder { color: #475569; }

    /* Messages */
    .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
    .msg { max-width: 80%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; word-wrap: break-word; white-space: pre-wrap; }
    .msg.user { align-self: flex-end; background: #0f62fe; color: #fff; border-bottom-right-radius: 4px; }
    .msg.assistant { align-self: flex-start; background: #1e293b; color: #e2e8f0; border-bottom-left-radius: 4px; }
    .msg.system { align-self: center; background: none; color: #475569; font-size: 12px; padding: 4px 8px; }
    .msg.tool { align-self: flex-start; background: #1a2332; color: #94a3b8; font-size: 12px; border-left: 3px solid #3b82f6; border-radius: 4px; }
    .msg.error { align-self: center; background: #7f1d1d30; color: #fca5a5; font-size: 12px; border: 1px solid #7f1d1d; }
    .msg.thinking { align-self: flex-start; background: none; color: #475569; font-size: 12px; font-style: italic; padding: 2px 8px; }

    /* Inline images in chat */
    .msg img.chat-img { max-width: 100%; max-height: 400px; border-radius: 8px; margin-top: 8px; cursor: pointer; display: block; }
    .msg img.chat-img:hover { opacity: 0.9; }
    .msg .img-caption { font-size: 11px; color: #64748b; margin-top: 4px; }

    /* Lightbox overlay */
    .lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; cursor: zoom-out; }
    .lightbox.active { display: flex; }
    .lightbox img { max-width: 95%; max-height: 95%; border-radius: 8px; }

    /* Input */
    .input-area { display: flex; gap: 8px; padding: 12px 16px; background: #141d35; border-top: 1px solid #1e2d4a; flex-shrink: 0; flex-wrap: wrap; }
    .input-row { display: flex; gap: 8px; width: 100%; align-items: flex-end; }
    .input-area textarea { flex: 1; padding: 10px 14px; border-radius: 8px; border: 1px solid #1e2d4a; background: #1e293b; color: #e2e8f0; font-size: 14px; font-family: inherit; resize: none; min-height: 42px; max-height: 120px; }
    .input-area textarea::placeholder { color: #475569; }
    .input-area textarea:focus { outline: none; border-color: #0f62fe; }
    .upload-btn { padding: 10px 12px; border: none; border-radius: 8px; background: #1e293b; color: #94a3b8; font-size: 18px; cursor: pointer; align-self: flex-end; border: 1px solid #1e2d4a; transition: all 0.15s; }
    .upload-btn:hover { background: #2d3a52; color: #e2e8f0; }
    .send-btn { padding: 10px 20px; border: none; border-radius: 8px; background: #0f62fe; color: #fff; font-weight: 600; font-size: 14px; cursor: pointer; align-self: flex-end; }
    .send-btn:disabled { background: #1e3a5f; color: #475569; cursor: not-allowed; }
    .send-btn:hover:not(:disabled) { background: #2563eb; }

    /* File previews */
    .file-previews { display: flex; gap: 8px; width: 100%; flex-wrap: wrap; padding: 0; }
    .file-previews:empty { display: none; }
    .file-preview { display: flex; align-items: center; gap: 6px; padding: 4px 8px; background: #1e293b; border: 1px solid #1e2d4a; border-radius: 6px; font-size: 12px; color: #94a3b8; max-width: 220px; }
    .file-preview img { width: 32px; height: 32px; border-radius: 4px; object-fit: cover; }
    .file-preview .file-icon { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; background: #0f172a; border-radius: 4px; font-size: 14px; }
    .file-preview .file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-preview .file-size { color: #475569; font-size: 10px; }
    .file-preview .remove-file { cursor: pointer; color: #ef4444; font-weight: bold; padding: 0 4px; }
    .file-preview .remove-file:hover { color: #f87171; }

    /* Reconnect banner */
    .reconnect-banner { display: none; align-items: center; justify-content: center; gap: 12px; padding: 10px 16px; background: #7f1d1d; border-bottom: 1px solid #991b1b; flex-shrink: 0; font-size: 13px; color: #fca5a5; }
    .reconnect-banner.active { display: flex; }
    .reconnect-banner button { padding: 4px 14px; border: 1px solid #f87171; border-radius: 4px; background: transparent; color: #f87171; font-size: 12px; font-weight: 600; cursor: pointer; }
    .reconnect-banner button:hover { background: #991b1b; color: #fff; }
    .reconnect-banner .reconnect-countdown { color: #f87171; font-weight: 600; }

    /* Drag overlay */
    .drag-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,98,254,0.15); border: 3px dashed #0f62fe; z-index: 999; justify-content: center; align-items: center; pointer-events: none; }
    .drag-overlay.active { display: flex; }
    .drag-overlay span { font-size: 20px; font-weight: 600; color: #60a5fa; background: #0c162f; padding: 16px 32px; border-radius: 12px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Secure-Claw</h1>
    <div class="toggle-group">
      <button class="toggle-btn active" id="btnWs">WebSocket</button>
      <button class="toggle-btn" id="btnHttp">HTTP</button>
    </div>
    <button class="new-session-btn" id="newSessionBtn">New Session</button>
    <a class="setup-link" href="/ui/setup.html">Setup</a>
    <a class="setup-link" href="/ui/skills.html">Skills</a>
    <a class="setup-link" href="/ui/hub.html">Hub</a>
    <a class="setup-link" href="/ui/heartbeat.html">Heartbeat</a>
    <a class="setup-link" href="/ui/security.html">Security</a>
    <div class="header-right">
      <span class="provider-tag" id="providerTag"></span>
      <div class="status-dot" id="statusDot"></div>
      <span class="status-text" id="statusText">disconnected</span>
      <span class="session-id" id="sessionLabel"></span>
    </div>
  </div>

  <div class="config-bar">
    <input id="apiToken" type="password" placeholder="API Token (optional)" />
  </div>

  <div class="reconnect-banner" id="reconnectBanner">
    <span>Connection lost.</span>
    <span>Reconnecting in <span class="reconnect-countdown" id="reconnectCountdown">3</span>s...</span>
    <button id="reconnectNowBtn">Reconnect Now</button>
  </div>

  <div class="messages" id="messages"></div>

  <div class="drag-overlay" id="dragOverlay"><span>Drop files to attach</span></div>

  <div class="input-area">
    <div class="file-previews" id="filePreviews"></div>
    <div class="input-row">
      <button class="upload-btn" id="uploadBtn" title="Attach files">&#128206;</button>
      <textarea id="input" placeholder="Type a message... (drop or paste files)" rows="1"></textarea>
      <button class="send-btn" id="sendBtn">Send</button>
    </div>
    <input type="file" id="fileInput" multiple hidden accept="image/*,.txt,.csv,.md,.json,.xml,.html,.css,.js,.ts,.jsx,.tsx,.py,.go,.rs,.java,.c,.cpp,.h,.hpp,.rb,.php,.sh,.yml,.yaml,.toml,.ini,.sql,.pdf,.zip,.doc,.docx,.xls,.xlsx,.pptx,.log" />
  </div>

  <div class="lightbox" id="lightbox" onclick="this.classList.remove('active')">
    <img id="lightboxImg" src="" alt="Full size" />
  </div>

<script>
// --- State ---
let mode = 'ws';
let ws = null;
let sending = false;
let currentSessionId = localStorage.getItem('nexus_ws_session') || null;
let httpSessionId = localStorage.getItem('nexus_http_session') || null;
let pendingFiles = []; // { file: File, uploaded?: { id, name, mimeType, path, size } }
let historyRestored = false;

// --- Reconnect state ---
let reconnectAttempts = 0;
let reconnectTimer = null;
let countdownTimer = null;
const RECONNECT_BASE_MS = 3000;
const RECONNECT_MAX_MS = 30000;

function persistSession() {
  if (currentSessionId) localStorage.setItem('nexus_ws_session', currentSessionId);
  if (httpSessionId) localStorage.setItem('nexus_http_session', httpSessionId);
}

const msgContainer = document.getElementById('messages');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const sessionLabel = document.getElementById('sessionLabel');
const btnWs = document.getElementById('btnWs');
const btnHttp = document.getElementById('btnHttp');
const newSessionBtn = document.getElementById('newSessionBtn');
const apiTokenInput = document.getElementById('apiToken');

// --- Persist token ---
apiTokenInput.value = localStorage.getItem('secureclaw_api_token') || '';
apiTokenInput.addEventListener('input', () => {
  localStorage.setItem('secureclaw_api_token', apiTokenInput.value.trim());
  if (mode === 'ws') reconnectWs();
});

// --- Helpers ---
function getToken() { return apiTokenInput.value.trim(); }

function shortSession(id) {
  if (!id) return '';
  return id.length > 16 ? id.slice(0, 8) + '...' + id.slice(-4) : id;
}

function updateSessionLabel() {
  const id = mode === 'ws' ? currentSessionId : httpSessionId;
  sessionLabel.textContent = id ? shortSession(id) : '';
}

function addMsg(text, cls) {
  const div = document.createElement('div');
  div.className = 'msg ' + cls;

  // Detect image paths in the text and render them inline
  const imgPattern = /(?:\/output\/[^\s"']+\.(?:png|jpg|jpeg|gif|webp))/gi;
  const images = text.match(imgPattern);

  if (images && images.length > 0) {
    // Render text with images embedded
    const textWithoutPaths = text.replace(imgPattern, '').trim();
    if (textWithoutPaths) {
      const textSpan = document.createElement('span');
      textSpan.textContent = textWithoutPaths;
      div.appendChild(textSpan);
    }
    for (const src of images) {
      const img = document.createElement('img');
      img.className = 'chat-img';
      img.src = src;
      img.alt = 'Generated image';
      img.loading = 'lazy';
      img.onclick = (e) => {
        e.stopPropagation();
        document.getElementById('lightboxImg').src = src;
        document.getElementById('lightbox').classList.add('active');
      };
      div.appendChild(img);
      const caption = document.createElement('div');
      caption.className = 'img-caption';
      caption.textContent = src.split('/').pop();
      div.appendChild(caption);
    }
  } else {
    div.textContent = text;
  }

  msgContainer.appendChild(div);
  msgContainer.scrollTop = msgContainer.scrollHeight;
  return div;
}

function clearMessages() {
  msgContainer.innerHTML = '';
}

function setStatus(state, text) {
  statusDot.className = 'status-dot ' + state;
  statusText.textContent = text;
}

function setDisabled(disabled) {
  sending = disabled;
  sendBtn.disabled = disabled;
}

// --- Reconnect banner ---
const reconnectBanner = document.getElementById('reconnectBanner');
const reconnectCountdown = document.getElementById('reconnectCountdown');
const reconnectNowBtn = document.getElementById('reconnectNowBtn');

function showReconnectBanner() {
  reconnectBanner.classList.add('active');
}

function hideReconnectBanner() {
  reconnectBanner.classList.remove('active');
  clearTimeout(reconnectTimer);
  clearInterval(countdownTimer);
  reconnectTimer = null;
  countdownTimer = null;
}

function scheduleReconnect() {
  const delay = Math.min(RECONNECT_BASE_MS * Math.pow(2, reconnectAttempts), RECONNECT_MAX_MS);
  let remaining = Math.ceil(delay / 1000);
  reconnectCountdown.textContent = remaining;
  showReconnectBanner();

  countdownTimer = setInterval(() => {
    remaining--;
    reconnectCountdown.textContent = Math.max(remaining, 0);
  }, 1000);

  reconnectTimer = setTimeout(() => {
    clearInterval(countdownTimer);
    reconnectAttempts++;
    connectWs();
  }, delay);
}

reconnectNowBtn.addEventListener('click', () => {
  clearTimeout(reconnectTimer);
  clearInterval(countdownTimer);
  reconnectAttempts = 0;
  connectWs();
});

// --- Restore chat history from server ---
async function restoreHistory(sessionId) {
  if (!sessionId || historyRestored) return;
  try {
    const headers = {};
    const token = getToken();
    if (token) headers['x-api-token'] = token;
    const res = await fetch('/api/sessions/' + encodeURIComponent(sessionId), { headers });
    if (!res.ok) return;
    const session = await res.json();
    if (!session.messages || session.messages.length === 0) return;

    // Show summary if present
    if (session.summary) {
      addMsg('(Previous conversation summary loaded)', 'system');
    }

    // Replay user and assistant messages
    for (const m of session.messages) {
      if (m.role === 'user') addMsg(m.content || '', 'user');
      else if (m.role === 'assistant' && m.content) addMsg(m.content, 'assistant');
    }
    historyRestored = true;
  } catch {}
}

// --- Auto-resize textarea ---
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

// --- WebSocket ---
function connectWs() {
  if (ws) { ws.close(); ws = null; }
  const token = getToken();
  const params = new URLSearchParams();
  if (token) params.set('token', token);
  if (currentSessionId) params.set('sessionId', currentSessionId);
  const qs = params.toString();
  const url = `ws://${location.hostname}:${location.port}/ws` + (qs ? `?${qs}` : '');
  setStatus('', 'connecting...');

  ws = new WebSocket(url);

  ws.onopen = () => {
    setStatus('connected', 'connected');
    reconnectAttempts = 0;
    hideReconnectBanner();
  };

  ws.onclose = (e) => {
    ws = null;
    if (e.code === 4001) {
      setStatus('error', 'unauthorized');
      // Don't auto-reconnect on auth failure
      return;
    }
    setStatus('error', 'disconnected');
    // Auto-reconnect with backoff (only if we're in WS mode)
    if (mode === 'ws') {
      scheduleReconnect();
    }
  };

  ws.onerror = () => setStatus('error', 'connection error');

  ws.onmessage = (e) => {
    let data;
    try { data = JSON.parse(e.data); } catch { return; }

    switch (data.type) {
      case 'connected':
        if (!currentSessionId && data.sessionId) {
          currentSessionId = data.sessionId;
          persistSession();
        }
        updateSessionLabel();
        // Restore history from server on first connect if we have a session
        if (!historyRestored && currentSessionId) {
          restoreHistory(currentSessionId);
        }
        break;
      case 'session':
        currentSessionId = data.sessionId;
        historyRestored = false;
        persistSession();
        updateSessionLabel();
        clearMessages();
        addMsg('New session started', 'system');
        break;
      case 'thinking':
        addMsg(`Thinking... (iteration ${data.iteration})`, 'thinking');
        break;
      case 'tool_call':
        addMsg(`Tool: ${data.name}(${JSON.stringify(data.args)})`, 'tool');
        break;
      case 'tool_result':
        if (data.error) {
          addMsg(`Error: ${data.error}`, 'tool');
        } else {
          const output = data.output || '';
          // Try to extract image path from JSON tool output
          let imgPath = null;
          try {
            const parsed = JSON.parse(output);
            if (parsed.path && /\.(png|jpg|jpeg|gif|webp)$/i.test(parsed.path)) {
              imgPath = parsed.path;
            }
          } catch {}
          if (imgPath) {
            addMsg(`Result: ${imgPath}`, 'tool');
          } else {
            addMsg(`Result: ${output.slice(0, 500)}`, 'tool');
          }
        }
        break;
      case 'final':
        addMsg(data.text ?? '(no response)', 'assistant');
        if (data.sessionId) {
          currentSessionId = data.sessionId;
          persistSession();
          updateSessionLabel();
        }
        setDisabled(false);
        break;
      case 'error':
        addMsg(data.error, 'error');
        setDisabled(false);
        break;
    }
  };
}

function reconnectWs() {
  if (mode === 'ws') connectWs();
}

function sendWs(text, attachments) {
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    addMsg('Not connected. Reconnecting...', 'system');
    connectWs();
    return;
  }
  setDisabled(true);
  if (!attachments) addMsg(text, 'user');
  const payload = { type: 'message', text };
  if (currentSessionId) payload.sessionId = currentSessionId;
  if (attachments?.length) payload.attachmentIds = attachments.map(a => a.id);
  ws.send(JSON.stringify(payload));
}

// --- HTTP ---
async function sendHttp(text, attachments) {
  setDisabled(true);
  if (!attachments) addMsg(text, 'user');
  const thinkingMsg = addMsg('Thinking...', 'thinking');

  try {
    const headers = { 'Content-Type': 'application/json' };
    const token = getToken();
    if (token) headers['x-api-token'] = token;

    const body = { message: { text, from: { id: httpSessionId || 'chat-ui' } } };
    if (attachments?.length) body.message.attachmentIds = attachments.map(a => a.id);

    const res = await fetch('/webhook/telegram', {
      method: 'POST',
      headers,
      body: JSON.stringify(body)
    });
    const data = await res.json();

    thinkingMsg.remove();

    if (data.sessionId) {
      httpSessionId = data.sessionId;
      persistSession();
      updateSessionLabel();
    }

    if (data.toolResults?.length) {
      for (const tr of data.toolResults) {
        if (tr.error) {
          addMsg(`${tr.name}: Error - ${tr.error}`, 'tool');
        } else {
          let imgPath = null;
          try {
            const parsed = JSON.parse(tr.output);
            if (parsed.path && /\.(png|jpg|jpeg|gif|webp)$/i.test(parsed.path)) {
              imgPath = parsed.path;
            }
          } catch {}
          addMsg(imgPath ? `${tr.name}: ${imgPath}` : `${tr.name}: ${tr.output.slice(0, 500)}`, 'tool');
        }
      }
    }

    if (data.error) {
      addMsg(data.error, 'error');
    } else {
      addMsg(data.final ?? '(no response)', 'assistant');
    }
  } catch (err) {
    thinkingMsg.remove();
    addMsg('Request failed: ' + err.message, 'error');
  }

  setDisabled(false);
}

// --- New Session ---
newSessionBtn.addEventListener('click', () => {
  historyRestored = false;
  if (mode === 'ws' && ws && ws.readyState === WebSocket.OPEN) {
    currentSessionId = null;
    localStorage.removeItem('nexus_ws_session');
    ws.send(JSON.stringify({ type: 'new_session' }));
  } else {
    httpSessionId = null;
    localStorage.removeItem('nexus_http_session');
    clearMessages();
    addMsg('New session started', 'system');
    updateSessionLabel();
  }
});

// --- Mode toggle ---
function setMode(newMode) {
  mode = newMode;
  btnWs.classList.toggle('active', mode === 'ws');
  btnHttp.classList.toggle('active', mode === 'http');

  if (mode === 'ws') {
    connectWs();
  } else {
    hideReconnectBanner();
    if (ws) { ws.close(); ws = null; }
    setStatus('', 'HTTP mode');
  }

  updateSessionLabel();
  addMsg(`Switched to ${mode === 'ws' ? 'WebSocket' : 'HTTP'} mode`, 'system');
}

btnWs.addEventListener('click', () => setMode('ws'));
btnHttp.addEventListener('click', () => setMode('http'));

// --- Send ---
async function send() {
  const text = input.value.trim();
  if ((!text && pendingFiles.length === 0) || sending) return;
  input.value = '';
  input.style.height = 'auto';

  let attachments = null;
  if (pendingFiles.length > 0) {
    try {
      setDisabled(true);
      addMsg('Uploading files...', 'thinking');
      attachments = await uploadFiles();
      // Remove "Uploading..." message
      const msgs = msgContainer.querySelectorAll('.msg.thinking');
      const last = msgs[msgs.length - 1];
      if (last && last.textContent === 'Uploading files...') last.remove();
    } catch (err) {
      addMsg('Upload failed: ' + err.message, 'error');
      setDisabled(false);
      return;
    }
    pendingFiles = [];
    renderPreviews();
  }

  const displayText = text + (attachments?.length ? '\n[Attached: ' + attachments.map(a => a.name).join(', ') + ']' : '');

  if (mode === 'ws') sendWs(text || 'Analyze the attached files', attachments);
  else sendHttp(text || 'Analyze the attached files', attachments);

  if (attachments?.length) {
    addMsg(displayText, 'user');
  }
}

sendBtn.addEventListener('click', send);
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

// --- File Upload ---
const fileInput = document.getElementById('fileInput');
const uploadBtn = document.getElementById('uploadBtn');
const filePreviews = document.getElementById('filePreviews');
const dragOverlay = document.getElementById('dragOverlay');

uploadBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => {
  if (fileInput.files.length) addFiles(Array.from(fileInput.files));
  fileInput.value = '';
});

function addFiles(files) {
  const MAX_SIZE = 30 * 1024 * 1024;
  for (const file of files) {
    if (file.size > MAX_SIZE) {
      addMsg(`File "${file.name}" exceeds 30MB limit`, 'error');
      continue;
    }
    if (pendingFiles.some(p => p.file.name === file.name && p.file.size === file.size)) continue;
    pendingFiles.push({ file });
  }
  renderPreviews();
}

function renderPreviews() {
  filePreviews.innerHTML = '';
  for (let i = 0; i < pendingFiles.length; i++) {
    const pf = pendingFiles[i];
    const div = document.createElement('div');
    div.className = 'file-preview';

    if (pf.file.type.startsWith('image/')) {
      const img = document.createElement('img');
      img.src = URL.createObjectURL(pf.file);
      div.appendChild(img);
    } else {
      const icon = document.createElement('div');
      icon.className = 'file-icon';
      const ext = pf.file.name.split('.').pop()?.toUpperCase() || '?';
      icon.textContent = ext.slice(0, 3);
      div.appendChild(icon);
    }

    const name = document.createElement('span');
    name.className = 'file-name';
    name.textContent = pf.file.name;
    name.title = pf.file.name;
    div.appendChild(name);

    const size = document.createElement('span');
    size.className = 'file-size';
    size.textContent = formatSize(pf.file.size);
    div.appendChild(size);

    const remove = document.createElement('span');
    remove.className = 'remove-file';
    remove.textContent = '\u00d7';
    remove.onclick = () => { pendingFiles.splice(i, 1); renderPreviews(); };
    div.appendChild(remove);

    filePreviews.appendChild(div);
  }
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

async function uploadFiles() {
  const toUpload = pendingFiles.filter(p => !p.uploaded);
  if (toUpload.length === 0) return pendingFiles.map(p => p.uploaded);

  const formData = new FormData();
  for (const pf of toUpload) {
    formData.append('files', pf.file);
  }

  const headers = {};
  const token = getToken();
  if (token) headers['x-api-token'] = token;

  const res = await fetch('/api/upload', { method: 'POST', headers, body: formData });
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: 'Upload failed' }));
    throw new Error(err.error || 'Upload failed');
  }
  const data = await res.json();

  // Map uploaded results back to pending files
  let idx = 0;
  for (const pf of toUpload) {
    pf.uploaded = data.attachments[idx++];
  }

  return pendingFiles.map(p => p.uploaded);
}

// Drag and drop
let dragCounter = 0;
document.addEventListener('dragenter', (e) => {
  e.preventDefault();
  dragCounter++;
  dragOverlay.classList.add('active');
});
document.addEventListener('dragleave', (e) => {
  e.preventDefault();
  dragCounter--;
  if (dragCounter <= 0) { dragCounter = 0; dragOverlay.classList.remove('active'); }
});
document.addEventListener('dragover', (e) => e.preventDefault());
document.addEventListener('drop', (e) => {
  e.preventDefault();
  dragCounter = 0;
  dragOverlay.classList.remove('active');
  if (e.dataTransfer?.files?.length) addFiles(Array.from(e.dataTransfer.files));
});

// Clipboard paste
input.addEventListener('paste', (e) => {
  const items = e.clipboardData?.items;
  if (!items) return;
  const files = [];
  for (const item of items) {
    if (item.kind === 'file') {
      const f = item.getAsFile();
      if (f) files.push(f);
    }
  }
  if (files.length) {
    e.preventDefault();
    addFiles(files);
  }
});

// --- Fetch provider ---
async function fetchProvider() {
  try {
    const headers = {};
    const token = getToken();
    if (token) headers['x-api-token'] = token;
    const r = await fetch('/api/health', { headers });
    const j = await r.json();
    const tag = document.getElementById('providerTag');
    const name = j.provider || '';
    const model = j.model || '';
    tag.textContent = model ? `${name} · ${model}` : name;
    tag.className = 'provider-tag' + (name === 'ollama' ? ' ollama' : name === 'anthropic' ? ' anthropic' : '');
  } catch {
    // Fall back to unauthenticated health
    try {
      const r = await fetch('/health');
      const j = await r.json();
      const tag = document.getElementById('providerTag');
      const name = j.provider || '';
      tag.textContent = name;
      tag.className = 'provider-tag' + (name === 'ollama' ? ' ollama' : name === 'anthropic' ? ' anthropic' : '');
    } catch {}
  }
}

// --- Init ---
fetchProvider();
setMode('ws');
