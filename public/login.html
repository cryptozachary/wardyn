<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Bastion — Login</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="icon" type="image/png" href="/ui/assets/favicon.png" />
  <link rel="stylesheet" href="/ui/styles.css" />
  <style>
    body { display: grid; place-items: center; min-height: 100vh; }
    form { background: var(--surface); padding: 2rem; border-radius: 8px; width: min(360px, 90vw); box-shadow: 0 4px 24px rgba(0,0,0,.4); border: 1px solid var(--border); }
    form h1 { margin-top: 0; font-family: var(--mono); font-size: 1.25rem; letter-spacing: 0.5px; }
    .err { color: #f87171; font-size: .9rem; margin-top: .5rem; min-height: 1.2rem; }
  </style>
</head>
<body>
  <form id="f">
    <div style="text-align:center;margin-bottom:12px"><img src="/ui/assets/logo-full.png" alt="Bastion" style="height:80px;width:auto" /></div>
    <h1 style="text-align:center">Bastion</h1>
    <label for="token">API Token</label>
    <input id="token" type="password" autocomplete="current-password" autofocus required>
    <button type="submit">Sign in</button>
    <div class="err" id="err"></div>
  </form>
  <script>
    const params = new URLSearchParams(location.search);
    const next = params.get("next") || "/ui/hub.html";
    document.getElementById("f").addEventListener("submit", async (e) => {
      e.preventDefault();
      const token = document.getElementById("token").value;
      const err = document.getElementById("err");
      err.textContent = "";
      try {
        const r = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ token }),
        });
        if (!r.ok) { err.textContent = "Invalid token"; return; }
        location.href = next;
      } catch (ex) {
        err.textContent = ex.message || "network error";
      }
    });
  </script>
</body>
</html>
