name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Security tests
        run: npx tsx tests/security.test.ts

      - name: Integration tests
        run: npx tsx tests/integration.test.ts

      - name: Smoke test (boot compiled server)
        env:
          SMOKE_PORT: 18085
        run: npx tsx tests/smoke.test.ts

      - name: Backup/restore round-trip
        run: |
          npx tsx scripts/backup.ts
          BACKUP_DIR=$(ls -td backups/secureclaw-* | head -1)
          echo "Restoring from $BACKUP_DIR"
          npx tsx scripts/restore.ts --from "$BACKUP_DIR" --force
